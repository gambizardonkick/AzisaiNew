<!DOCTYPE html>
<html lang="ja">
<head>
  <title>AZISAI | ノート</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="AZISAI - お知らせ・ストーリー">
  <link rel="icon" type="image/jpg" href="/assets/logo.png">
  <link rel="stylesheet" href="/css/leaderboard.css">
  <style>
    .notes-section{max-width:800px;margin:0 auto;padding:0 0 40px}
    .note-card{
      background:linear-gradient(180deg,rgba(255,255,255,0.04) 0%,rgba(255,255,255,0.01) 100%);
      border:1px solid rgba(255,255,255,0.06);border-radius:16px;
      padding:28px 32px;margin-bottom:20px;cursor:pointer;
      transition:all .3s ease;position:relative;overflow:hidden;
    }
    .note-card::before{
      content:'';position:absolute;top:0;left:0;right:0;height:3px;
      background:linear-gradient(90deg,var(--az-primary),var(--az-secondary),var(--az-accent));
      opacity:0;transition:opacity .3s;
    }
    .note-card:hover{border-color:rgba(255,255,255,0.12);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,0.3)}
    .note-card:hover::before{opacity:1}
    .note-card__title{font-size:20px;font-weight:800;margin-bottom:10px;color:#fff}
    .note-card__preview{
      color:var(--az-text-dim);font-size:14px;line-height:1.7;
      display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
      margin-bottom:14px;
    }
    .note-card__images{display:flex;gap:8px;margin-bottom:14px;overflow:hidden;border-radius:10px}
    .note-card__images img{height:140px;object-fit:cover;border-radius:10px;flex-shrink:0}
    .note-card__images.single img{width:100%;height:200px}
    .note-card__meta{display:flex;align-items:center;gap:12px;font-size:12px;color:var(--az-text-dim);font-family:'Space Grotesk',sans-serif;flex-wrap:wrap}
    .note-card__tag{
      padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;
      background:rgba(79,125,247,0.12);color:var(--az-primary);
    }
    .note-card__stats{display:flex;gap:14px;font-size:12px;color:var(--az-text-dim);font-family:'Space Grotesk',sans-serif}
    .note-card__stats span{display:flex;align-items:center;gap:4px}

    .note-detail-view{display:none;max-width:800px;margin:0 auto;padding:0 0 40px}
    .note-detail-view.active{display:block}
    .note-detail__back{
      display:inline-flex;align-items:center;gap:6px;color:var(--az-text-dim);
      font-size:13px;font-weight:600;cursor:pointer;margin-bottom:24px;padding:8px 0;
      transition:color .2s;border:none;background:none;font-family:'Outfit',sans-serif;
    }
    .note-detail__back:hover{color:#fff}
    .note-detail__title{font-size:34px;font-weight:800;margin-bottom:16px;line-height:1.3}
    .note-detail__meta{
      display:flex;align-items:center;gap:16px;margin-bottom:24px;
      font-size:13px;color:var(--az-text-dim);font-family:'Space Grotesk',sans-serif;
      flex-wrap:wrap;
    }
    .note-detail__images{margin-bottom:28px}
    .note-detail__images img{
      width:100%;max-height:400px;object-fit:cover;border-radius:14px;
      margin-bottom:10px;display:block;
    }
    .note-detail__content{font-size:16px;line-height:1.9;color:var(--az-text);margin-bottom:32px}
    .note-detail__content p{margin-bottom:16px}

    .note-actions{
      display:flex;gap:16px;align-items:center;padding:16px 0;
      border-top:1px solid rgba(255,255,255,0.06);border-bottom:1px solid rgba(255,255,255,0.06);
      margin-bottom:28px;
    }
    .like-btn{
      display:flex;align-items:center;gap:6px;padding:8px 18px;border-radius:24px;
      border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);
      color:var(--az-text-dim);font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;
      cursor:pointer;transition:all .2s;
    }
    .like-btn:hover{border-color:rgba(255,100,100,0.3);color:#ff6b6b;background:rgba(255,100,100,0.05)}
    .like-btn.liked{border-color:rgba(255,100,100,0.3);color:#ff6b6b;background:rgba(255,100,100,0.08)}
    .stat-display{font-size:13px;color:var(--az-text-dim);display:flex;align-items:center;gap:5px;font-family:'Space Grotesk',sans-serif}

    .comments-section h3{font-size:16px;font-weight:700;margin-bottom:16px}
    .comment-form{display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap}
    .comment-form input,.comment-form textarea{
      padding:10px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.08);
      background:rgba(255,255,255,0.03);color:#fff;font-family:'Outfit',sans-serif;font-size:13px;
      outline:none;transition:border-color .2s;
    }
    .comment-form input:focus,.comment-form textarea:focus{border-color:var(--az-primary)}
    .comment-form input{width:160px}
    .comment-form textarea{flex:1;min-width:200px;resize:none;height:40px}
    .comment-submit{
      padding:10px 20px;border:none;border-radius:10px;cursor:pointer;
      background:var(--az-primary);color:#fff;font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;
      transition:background .2s;
    }
    .comment-submit:hover{background:#6b92ff}
    .comment-item{
      padding:14px 16px;border-radius:12px;margin-bottom:10px;
      background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);
    }
    .comment-item__header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
    .comment-item__name{font-weight:700;font-size:13px;color:#fff}
    .comment-item__date{font-size:11px;color:var(--az-text-dim);font-family:'Space Grotesk',sans-serif}
    .comment-item__text{font-size:14px;color:var(--az-text-dim);line-height:1.6}
    .no-comments{color:var(--az-text-dim);font-size:13px;font-style:italic;padding:8px 0}

    .notes-empty{text-align:center;padding:80px 20px;color:var(--az-text-dim)}
    .notes-empty .empty-icon{font-size:48px;margin-bottom:16px;opacity:0.4}
    .notes-empty p{font-size:15px}

    @media(max-width:600px){
      .notes-section{padding:0 0 24px}
      .note-card{padding:20px;border-radius:14px;margin-bottom:14px}
      .note-card__title{font-size:17px;margin-bottom:8px}
      .note-card__preview{font-size:13px;line-height:1.6;margin-bottom:10px}
      .note-card__images img{height:100px;border-radius:8px}
      .note-card__images.single img{height:160px}
      .note-card__meta{gap:8px;font-size:11px}
      .note-card__tag{font-size:10px;padding:2px 8px}
      .note-detail-view{padding:0 0 24px}
      .note-detail__title{font-size:24px;margin-bottom:12px}
      .note-detail__meta{font-size:12px;gap:10px;margin-bottom:16px}
      .note-detail__content{font-size:14px;line-height:1.8;margin-bottom:24px}
      .note-detail__images img{border-radius:10px;max-height:280px}
      .note-actions{padding:12px 0;gap:12px;margin-bottom:20px}
      .comment-form{gap:8px}
      .comment-form input{width:100%}
      .comment-form textarea{min-width:100%}
      .comment-item{padding:12px 14px}
      .notes-empty{padding:50px 16px}
    }
  </style>
</head>
<body>

<div class="bg-animation">
  <div class="bg-orb blue"></div>
  <div class="bg-orb purple"></div>
  <div class="bg-orb cyan"></div>
  <div class="bg-orb deep"></div>
</div>
<div class="hex-grid"></div>
<div class="particles" id="particles"></div>

<div class="container">
  <header>
    <a href="/" class="logo-section">
      <img src="/assets/logo.png" alt="AZISAI">
      <h1>AZISAI</h1>
    </a>
    <nav class="nav-links">
      <a href="/" data-i18n="navHome">ホーム</a>
      <a href="/leaderboard/roobet" data-i18n="navLb">リーダーボード</a>
      <a href="/notes" class="active" data-i18n="navNotes">ノート</a>
    </nav>
    <div class="header-right">
      <div class="lang-toggle">
        <button class="lang-btn active" data-lang="ja">日本語</button>
        <button class="lang-btn" data-lang="en">EN</button>
      </div>
    </div>
  </header>

  <div class="hero" id="hero-section">
    <h1 class="hero-title">
      <span data-i18n="notesTitle">ノート</span>
    </h1>
    <p class="hero-subtitle" data-i18n="notesDesc">AZISAI からのお知らせ・ストーリー</p>
  </div>

  <div id="notes-list-view">
    <div class="notes-section">
      <div id="notes-container"></div>
    </div>
  </div>

  <div id="note-detail-view" class="note-detail-view">
    <button class="note-detail__back" id="back-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
      <span data-i18n="backToNotes">ノート一覧に戻る</span>
    </button>
    <h1 class="note-detail__title" id="detail-title"></h1>
    <div class="note-detail__meta" id="detail-meta"></div>
    <div class="note-detail__images" id="detail-images"></div>
    <div class="note-detail__content" id="detail-content"></div>
    <div class="note-actions" id="detail-actions"></div>
    <div class="comments-section">
      <h3 data-i18n="commentsTitle">コメント</h3>
      <div class="comment-form" id="comment-form">
        <input type="text" id="comment-name" data-i18n-placeholder="commentName" placeholder="名前（任意）">
        <textarea id="comment-text" data-i18n-placeholder="commentPlaceholder" placeholder="コメントを入力..."></textarea>
        <button class="comment-submit" id="comment-submit" data-i18n="commentSubmit">送信</button>
      </div>
      <div id="comments-list"></div>
    </div>
  </div>

  <footer>
    <div class="footer-warning" data-i18n="footerWarning">ギャンブルは自己責任で楽しんでください。未成年者のギャンブルは法律で禁止されています。</div>
    <div>AZISAI &copy; 2026</div>
  </footer>
</div>

<script>
(function(){
  'use strict';
  var currentLang = 'ja';
  var currentNoteId = null;

  var T = {
    ja: {
      navHome:'ホーム', navLb:'リーダーボード', navNotes:'ノート',
      notesTitle:'ノート', notesDesc:'AZISAI からのお知らせ・ストーリー',
      backToNotes:'ノート一覧に戻る',
      footerWarning:'ギャンブルは自己責任で楽しんでください。未成年者のギャンブルは法律で禁止されています。',
      emptyNotes:'まだノートはありません',
      commentsTitle:'コメント', commentSubmit:'送信',
      commentName:'名前（任意）', commentPlaceholder:'コメントを入力...',
      noComments:'コメントはまだありません',
      views:'閲覧', likes:'いいね', comments:'コメント',
    },
    en: {
      navHome:'Home', navLb:'Leaderboard', navNotes:'Notes',
      notesTitle:'Notes', notesDesc:'Updates & stories from AZISAI',
      backToNotes:'Back to notes',
      footerWarning:'Please gamble responsibly. Underage gambling is prohibited by law.',
      emptyNotes:'No notes yet',
      commentsTitle:'Comments', commentSubmit:'Submit',
      commentName:'Name (optional)', commentPlaceholder:'Write a comment...',
      noComments:'No comments yet',
      views:'views', likes:'likes', comments:'comments',
    }
  };

  function applyLang(lang) {
    currentLang = lang;
    document.documentElement.lang = lang;
    document.querySelectorAll('[data-i18n]').forEach(function(el) {
      var key = el.getAttribute('data-i18n');
      if (T[lang] && T[lang][key]) el.textContent = T[lang][key];
    });
    document.querySelectorAll('[data-i18n-placeholder]').forEach(function(el) {
      var key = el.getAttribute('data-i18n-placeholder');
      if (T[lang] && T[lang][key]) el.placeholder = T[lang][key];
    });
    document.querySelectorAll('.lang-btn').forEach(function(b) {
      b.classList.toggle('active', b.getAttribute('data-lang') === lang);
    });
  }

  document.querySelectorAll('.lang-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var lang = btn.getAttribute('data-lang');
      localStorage.setItem('azisai-lang', lang);
      applyLang(lang);
    });
  });
  var savedLang = localStorage.getItem('azisai-lang');
  if (savedLang && savedLang !== 'ja') applyLang(savedLang);

  function formatDate(iso) {
    var d = new Date(iso);
    var jst = new Date(d.getTime() + 9*60*60*1000);
    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return months[jst.getUTCMonth()] + ' ' + jst.getUTCDate() + ', ' + jst.getUTCFullYear();
  }

  function timeAgo(iso) {
    var diff = Date.now() - new Date(iso).getTime();
    var mins = Math.floor(diff / 60000);
    if (mins < 1) return currentLang === 'ja' ? 'たった今' : 'Just now';
    if (mins < 60) return mins + (currentLang === 'ja' ? '分前' : 'm ago');
    var hours = Math.floor(mins / 60);
    if (hours < 24) return hours + (currentLang === 'ja' ? '時間前' : 'h ago');
    var days = Math.floor(hours / 24);
    return days + (currentLang === 'ja' ? '日前' : 'd ago');
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function renderMarkdown(text) {
    return esc(text)
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/\n\n/g, '</p><p>')
      .replace(/\n/g, '<br>');
  }

  async function loadNotes() {
    var container = document.getElementById('notes-container');
    try {
      var res = await fetch('/api/notes');
      var notes = await res.json();
      if (!notes.length) {
        container.innerHTML = '<div class="notes-empty"><div class="empty-icon">📝</div><p>' + T[currentLang].emptyNotes + '</p></div>';
        return;
      }
      container.innerHTML = '';
      notes.forEach(function(note) {
        var card = document.createElement('div');
        card.className = 'note-card';
        card.onclick = function() { showNote(note.id); };

        var imagesHtml = '';
        if (note.images && note.images.length) {
          var cls = note.images.length === 1 ? 'note-card__images single' : 'note-card__images';
          imagesHtml = '<div class="' + cls + '">';
          note.images.slice(0, 3).forEach(function(u) { imagesHtml += '<img src="' + esc(u) + '" alt="">'; });
          imagesHtml += '</div>';
        }

        var tagsHtml = (note.tags || []).map(function(t) { return '<span class="note-card__tag">' + esc(t) + '</span>'; }).join('');
        card.innerHTML =
          '<div class="note-card__title">' + esc(note.title) + '</div>' +
          imagesHtml +
          '<div class="note-card__preview">' + esc(note.content.replace(/\n/g, ' ').slice(0, 200)) + '</div>' +
          '<div class="note-card__stats">' +
            '<span>👁 ' + (note.views || 0) + '</span>' +
            '<span>♥ ' + (note.likes || 0) + '</span>' +
            '<span>💬 ' + ((note.comments || []).length) + '</span>' +
          '</div>' +
          '<div class="note-card__meta">' +
            '<span>' + timeAgo(note.createdAt) + '</span>' +
            '<span>' + formatDate(note.createdAt) + '</span>' +
            tagsHtml +
          '</div>';
        container.appendChild(card);
      });
    } catch(e) {
      container.innerHTML = '<div class="notes-empty"><p>Failed to load notes</p></div>';
    }
  }

  async function showNote(id) {
    currentNoteId = id;
    try {
      fetch('/api/notes/' + id + '/view', { method: 'POST' });

      var res = await fetch('/api/notes/' + id);
      var note = await res.json();

      document.getElementById('detail-title').textContent = note.title;

      var tagsHtml = (note.tags || []).map(function(t) { return '<span class="note-card__tag">' + esc(t) + '</span>'; }).join('');
      document.getElementById('detail-meta').innerHTML =
        '<span>' + formatDate(note.createdAt) + '</span>' + tagsHtml;

      var imgsEl = document.getElementById('detail-images');
      if (note.images && note.images.length) {
        imgsEl.innerHTML = note.images.map(function(u) { return '<img src="' + esc(u) + '" alt="">'; }).join('');
      } else {
        imgsEl.innerHTML = '';
      }

      document.getElementById('detail-content').innerHTML = '<p>' + renderMarkdown(note.content) + '</p>';

      var views = (note.views || 0) + 1;
      var likes = note.likes || 0;
      var liked = localStorage.getItem('liked_' + id);
      document.getElementById('detail-actions').innerHTML =
        '<button class="like-btn' + (liked ? ' liked' : '') + '" id="like-btn">' +
          '<span>♥</span> <span id="like-count">' + likes + '</span>' +
        '</button>' +
        '<div class="stat-display">👁 ' + views + ' ' + T[currentLang].views + '</div>' +
        '<div class="stat-display">💬 ' + ((note.comments || []).length) + ' ' + T[currentLang].comments + '</div>';

      document.getElementById('like-btn').addEventListener('click', function() { likeNote(id); });

      renderComments(note.comments || []);

      document.getElementById('notes-list-view').style.display = 'none';
      document.getElementById('hero-section').style.display = 'none';
      document.getElementById('note-detail-view').classList.add('active');
      window.scrollTo(0, 0);
    } catch(e) { console.error(e); }
  }

  async function likeNote(id) {
    if (localStorage.getItem('liked_' + id)) return;
    try {
      var res = await fetch('/api/notes/' + id + '/like', { method: 'POST' });
      var data = await res.json();
      document.getElementById('like-count').textContent = data.likes;
      document.getElementById('like-btn').classList.add('liked');
      localStorage.setItem('liked_' + id, '1');
    } catch(e) { console.error(e); }
  }

  function renderComments(comments) {
    var list = document.getElementById('comments-list');
    if (!comments.length) {
      list.innerHTML = '<div class="no-comments">' + T[currentLang].noComments + '</div>';
      return;
    }
    list.innerHTML = '';
    comments.forEach(function(c) {
      var div = document.createElement('div');
      div.className = 'comment-item';
      div.innerHTML =
        '<div class="comment-item__header">' +
          '<span class="comment-item__name">' + esc(c.name) + '</span>' +
          '<span class="comment-item__date">' + timeAgo(c.createdAt) + '</span>' +
        '</div>' +
        '<div class="comment-item__text">' + esc(c.text) + '</div>';
      list.appendChild(div);
    });
  }

  document.getElementById('comment-submit').addEventListener('click', async function() {
    if (!currentNoteId) return;
    var name = document.getElementById('comment-name').value.trim() || (currentLang === 'ja' ? '匿名' : 'Anonymous');
    var text = document.getElementById('comment-text').value.trim();
    if (!text) return;
    try {
      var res = await fetch('/api/notes/' + currentNoteId + '/comment', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: name, text: text })
      });
      var comment = await res.json();
      document.getElementById('comment-text').value = '';
      var list = document.getElementById('comments-list');
      var noComments = list.querySelector('.no-comments');
      if (noComments) noComments.remove();
      var div = document.createElement('div');
      div.className = 'comment-item';
      div.innerHTML =
        '<div class="comment-item__header">' +
          '<span class="comment-item__name">' + esc(comment.name) + '</span>' +
          '<span class="comment-item__date">' + T[currentLang].emptyNotes.replace(/.*/, 'たった今') + '</span>' +
        '</div>' +
        '<div class="comment-item__text">' + esc(comment.text) + '</div>';
      list.appendChild(div);
    } catch(e) { console.error(e); }
  });

  document.getElementById('back-btn').addEventListener('click', function() {
    currentNoteId = null;
    document.getElementById('note-detail-view').classList.remove('active');
    document.getElementById('notes-list-view').style.display = 'block';
    document.getElementById('hero-section').style.display = '';
    loadNotes();
  });

  loadNotes();

  var pContainer = document.getElementById('particles');
  if (pContainer) {
    var types = ['dot','dot','glow','spark','star','star'];
    for (var i = 0; i < 45; i++) {
      var p = document.createElement('div');
      var type = types[Math.floor(Math.random() * types.length)];
      p.className = 'particle ' + type;
      p.style.left = Math.random() * 100 + '%';
      if (type === 'star') {
        p.style.top = Math.random() * 100 + '%';
        p.style.animationDuration = (3 + Math.random() * 6) + 's';
        p.style.animationDelay = (-Math.random() * 8) + 's';
      } else {
        p.style.animationDuration = (10 + Math.random() * 12) + 's';
        p.style.animationDelay = (-Math.random() * 20) + 's';
      }
      pContainer.appendChild(p);
    }
    for (var j = 0; j < 3; j++) {
      var s = document.createElement('div');
      s.className = 'particle aurora';
      s.style.top = (20 + Math.random() * 60) + '%';
      s.style.animationDuration = (6 + Math.random() * 6) + 's';
      s.style.animationDelay = (-Math.random() * 10) + 's';
      pContainer.appendChild(s);
    }
  }
})();
</script>
</body>
</html>
